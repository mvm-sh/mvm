name: Verify generated files

# Detects drift between committed generated files (stdlib/core, stdlib/ext,
# stdlib/syscall_*.go, *_string.go) and what `make generate` would produce
# against the current Go toolchain and mvm-sh/std snapshot.

on:
  push:
    branches: [ "main" ]
    paths:
      - 'cmd/extract/**'
      - 'stdlib/gen.go'
      - 'Makefile'
  pull_request:
    paths:
      - 'cmd/extract/**'
      - 'stdlib/gen.go'
      - 'Makefile'
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — catches Go toolchain and std-src updates
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Checkout std module
        uses: actions/checkout@v6
        with:
          repository: mvm-sh/std
          path: std-src
          fetch-depth: 1

      - name: Install stringer
        run: go install golang.org/x/tools/cmd/stringer@latest

      - name: Regenerate
        env:
          MVMSTD_SRC: ${{ github.workspace }}/std-src
        run: make generate

      - name: Verify no drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'make generate' locally and commit the result."
            exit 1
          fi
