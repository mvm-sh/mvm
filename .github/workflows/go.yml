# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Checkout std module
      uses: actions/checkout@v6
      with:
        repository: mvm-sh/std
        path: std-src
        fetch-depth: 1

    - name: Generate stdlib content
      env:
        MVMSTD_SRC: ${{ github.workspace }}/std-src
      run: make generate

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -race -cover ./...
