# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  build:
    # Run on both amd64 and arm64: the synth word-class dispatch
    # (vm/synth_word.go) marshals method args/results through register words, an
    # ABI-sensitive path that must be verified on each supported architecture.
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.0

    - name: Vet (mvm source checks)
      run: go run ./cmd/mvmlint .

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -race -cover ./...
