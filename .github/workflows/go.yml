# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  build:
    # amd64 + arm64: synth word-class dispatch (vm/synth_word.go) marshals method
    # args/results through registers, an ABI-sensitive path verified per arch.
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.0

    - name: Vet (mvm source checks)
      run: go run ./cmd/mvmlint .

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -race -cover ./...

  # wasm is 64-bit little-endian but uses a stack ABI (ABI0), so synth dispatch
  # takes a separate path (vm/synth_word_abi0.go). Build both wasm OSes (the js
  # build guards chunked stub-pool init) and run the synth tests under wazero.
  wasm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build (wasip1 + js)
      run: |
        GOOS=wasip1 GOARCH=wasm go build ./...
        GOOS=js GOARCH=wasm go build ./...

    - name: Install wazero (WASI runtime)
      run: go install github.com/tetratelabs/wazero/cmd/wazero@latest

    - name: Test synth dispatch on wasm
      run: |
        set -euo pipefail
        export GOWASIRUNTIME=wazero
        export PATH="$(go env GOROOT)/lib/wasm:$(go env GOPATH)/bin:$PATH"
        GOOS=wasip1 GOARCH=wasm go test ./runtype ./stdlib/stubs
        GOOS=wasip1 GOARCH=wasm go test ./vm -run TestABI0
        # Run each TestSynth case in its own process: wasm heap grows up into the
        # synthetic code-PC range (~0x10000000+); if a process's heap reaches it the
        # GC misreads code-range values as bad pointers and aborts (upstream Go wasm
        # limit). Fresh processes keep each test's heap low. Assign the list so a
        # failed list trips errexit instead of a zero-iteration green pass.
        tests=$(GOOS=wasip1 GOARCH=wasm go test -list 'TestSynth' ./interptest | grep '^Test')
        test -n "$tests" || { echo "no TestSynth tests discovered on wasm" >&2; exit 1; }
        for t in $tests; do
          GOOS=wasip1 GOARCH=wasm go test ./interptest -count=1 -run "^${t}$"
        done
        # TestFile (byte-identical _samples sweep) is not run on wasm yet: needs
        # per-sample batching plus a skip list for native-dispatch samples. Tracked
        # separately.
