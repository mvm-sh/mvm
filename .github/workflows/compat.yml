name: Compat matrix

# Refreshes the compatibility-matrix data (compat/*.json) consumed by
# mvm.sh/compat. Runs weekly, on every release tag, and on demand. The data is
# committed back to main; the website fetches it from raw.githubusercontent.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Never let two refreshes push at once (a tag push and the weekly cron can
# overlap); queue them instead of racing on the commit.
concurrency:
  group: compat
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    env:
      GOPROXY: https://proxy.golang.org,direct
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main # land the data commit on main regardless of trigger (e.g. tags)
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Generate matrix
        run: make compat

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compat/compat.json compat/history.jsonl compat/badge.json README.md
          if git diff --cached --quiet; then
            echo "No compat changes."
          else
            git commit -m "compat: refresh matrix ($(date -u +%Y-%m-%d))"
            git push origin HEAD:main
          fi
